<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rodriguez Ley Actividad 23</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <form action="">
        <h2>Calcular IMC de una persona</h2>
        <p>Ingrese su estatura en metros (ej. 1.75):</p>
        <input type="number" step="0.01" class="textbox" id="estatura">
        <p>Ingrese su peso en kilogramos:</p>
        <input type="number" class="textbox" id="peso"> <br><br>

        <input type="button" class="boton" value="Calcular" onclick="calcular('calcular')"><br>
        <input type="button" class="boton" value="Limpiar" onclick="calcular('limpiar')"><br>
        
        <h3>Su IMC es: <span id="res">Esperando operación...</span></h3>
        <h3>Clasificación: <span id="estado">Esperando operación...</span></h3>

        <input type="button" class="boton" value="Regresar a index" onclick="window.location.href='index.html';"> 
    </form>

    <script>
        function calcular(operacion) {
            const estatura = parseFloat(document.getElementById('estatura').value);
            const peso = parseFloat(document.getElementById('peso').value);
            const display = document.getElementById('res');
            const estado = document.getElementById('estado'); // Corregido: getElementById

            if (operacion === 'limpiar') {
                document.getElementById('estatura').value = '';
                document.getElementById('peso').value = '';
                display.textContent = 'Esperando operación...';
                estado.textContent = 'Esperando operación...';
                return;
            }

            if (isNaN(estatura) || isNaN(peso) || estatura <= 0) {
                display.textContent = "Ingrese valores válidos.";
                estado.textContent = "---";
                return;
            }

            if (operacion === 'calcular') {
                const imc = peso / (estatura * estatura); 
                display.textContent = imc.toFixed(2);

                // Lógica de evaluación corregida y dentro de la función
                if (imc < 18.5) {
                    estado.textContent = 'Bajo de peso';
                } else if (imc >= 18.5 && imc < 25) {
                    estado.textContent = 'Peso normal';
                } else if (imc >= 25 && imc < 30) {
                    estado.textContent = 'Sobrepeso';
                } else {
                    estado.textContent = 'Obesidad';
                }
            }
        }
    </script>
</body>
</html>
