<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facultad de 
        Ingenieria Mochis
    </title>
</head>
<body>
    <center>
    <h1>Prestamo de Equipo</h1>
    <h2>Universidad Autonoma de Sinaloa <br> Facultad de Ingenieria Mochis </h2>
    </center>
    
    <form action="#" method="post">
    
        <br>
        <label>Seleccione el equipo que le gustaria reservar:
        <select class="menu" name="renta" id="equipo">
            <option value="cc">Centro de Computo</option>
            <option value="Proyector">Proyector</option>
            <option value="Rputer">Router</option>
            <option value="Laptop">Laptop</option>
            <option value="Robot">Robot</option>
        </select> </label>
        <br>
        <br>
        <label>Ingrese el dia y hora en que le gustaria reservar el equipo: <input type="datetime-local" class="datetime" value="Enviar"></label>
        <br>
        <br>
        <label for="correo">Ingrese su matricula:</label>
        <input type="email" class="textbox" id="correo" name="correo"><br><br>

        <label for="nombre">Ingrese su nombre:</label>
        <input type="text" class="textbox" id="nombre" name="nombre">
        <input class="select" type="radio" id="hombre" name="genero" value="hombre">
        <label for="masc">Alumno</label>
        <input class="select" type="radio" id="mujer" name="genero" value="mujer">
        <label for="fem">Profesor</label><br><br>

        <label> Ingrese su carrera:
            <select name="carrera" class="menu" id="carrera">
                <option value="ISC">Ing. Software</option>
                <option value="IM">Ing. Civil</option>
                <option value="IQ">Ing. Procesos Industriales</option>
                <option value="IE">Ing. Geodesia</option>
            </select>
        </label> <br><br>

        <label> Ingrese su grado y grupo:
            <select name="grado" class="menu" id="grupo">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
            </select>
             <select name="grupo" class="menu" id="grupo">
                <option value="1">01</option>
                <option value="2">02</option>
                <option value="3">03</option>
                <option value="4">04</option>
            </select>  
        </label>
        <br><br>

        <input type="button" class="boton" value="Ver equipos disponibles justo ahora" onclick="window.location.href='Rodriguez_Ley_Ejercicio15tp3.html';"> 
      <input type="button" class="boton" value="Registrar" onclick="window.location.href='Rodriguez_Ley_Ejercicio15pt2.html';">
    </form>
</body>
</html>
