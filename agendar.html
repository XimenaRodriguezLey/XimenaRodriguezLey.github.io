<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facultad de 
        Ingenieria Mochis
    </title>
</head>
<body>
    <center>
    <h1>Prestamo de Equipo</h1>
    <h2>Universidad Autonoma de Sinaloa <br> Facultad de Ingenieria Mochis </h2>
    </center>
    
    <form action="#" method="post">
    
        <br>
        <label>Seleccione el equipo que le gustaria reservar:
        <select name="renta" id="equipo">
            <option value="cc">Centro de Computo</option>
            <option value="Proyector">Proyector</option>
            <option value="Rputer">Router</option>
            <option value="Laptop">Laptop</option>
            <option value="Robot">Robot</option>
        </select> </label>
        <br>
        <br>
        <label>Ingrese el dia y hora en que le gustaria reservar el equipo: <input type="datetime-local" value="Enviar"></label>
        <br>
        <br>
        <label for="nombre">Ingrese su nombre:</label>

        <input type="text" id="nombre" name="nombre">
        <input type="radio" id="hombre" name="genero" value="hombre">
        <label for="masc">Alumno</label>

        <input type="radio" id="mujer" name="genero" value="mujer">
        <label for="fem">Profesor</label>
        <br><br>
        <label for="correo">Ingrese su Matricula:</label>
        <input type="email" id="correo" name="correo"><br><br>

        <input type="button" value="Registrar" onclick="window.open('Rodriguez_Ley_Ejercicio15pt2', '_blank');">
    </form>
</body>
</html>
