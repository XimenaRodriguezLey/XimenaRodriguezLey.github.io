<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rodriguez Ley Actividad 21</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <form action="">
        <h2>Calcular la Formula General</h2>
        <p>Ingrese el valor de a:</p>
        <input type="number" class="textbox" id="a">
        <p>Ingrese el valor de b:</p>
        <input type="number" class="textbox" id="b">
        <p>Ingrese el valor de c:</p>
        <input type="number" class="textbox" id="c"> <br> <br><br>


        <input type="button" class="boton" value="Calcular" onclick="calcular('calcular')"><br>
        <input type="button" class="boton" value="Limpiar" onclick="calcular('limpiar')"><br>
        
        
        <h3>Resultado para x1: <span id="resultado">Esperando operación...</span></h3>
        <h3>Resultado para x2: <span id="resultado2">Esperando operación...</span></h3>

        <input type="button" class="boton" value="Regresar a index" onclick="window.location.href='index.html';"> 


    <script>
        function calcular(operacion) {
            var a = parseFloat(document.getElementById('a').value);
            var b = parseFloat(document.getElementById('b').value);
            var c = parseFloat(document.getElementById('c').value);
            var display = document.getElementById('resultado');
            var display2 = document.getElementById('resultado2');

            if (isNaN(a) || isNaN(b) || isNaN(c)) {
                display.textContent = "Por favor, ingrese todos los números.";
                return;
            }

            let resultado1, resultado2;
            const discriminante = b * b - 4 * a * c;
                    if (discriminante < 0) {
                        display.textContent = "No hay soluciones reales.";
                        display2.textContent = "No hay soluciones reales.";
                    } else {
                        const sqrtDiscriminante = Math.sqrt(discriminante);
                        resultado1 = (-b + sqrtDiscriminante) / (2 * a);
                        display.textContent =  resultado1.toFixed(2);
                        resultado2 = (-b - sqrtDiscriminante) / (2 * a);
                        display2.textContent =  + resultado2.toFixed(2);
                    }
        }
         function limpiar() {
                        document.getElementById('a').value = '';
                        document.getElementById('b').value = '';
                        document.getElementById('c').value = '';
                        document.getElementById('resultado').textContent = 'Esperando operación...';
                        document.getElementById('resultado2').textContent = 'Esperando operación...';

                }
        

    </script>
    </form>
</body>
</html>
